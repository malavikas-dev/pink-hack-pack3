<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QuizBattle AI</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:      #0d0d0d;
  --card:    #161616;
  --border:  #2a2a2a;
  --text:    #f0f0f0;
  --muted:   #666;
  --yellow:  #f5c518;
  --green:   #22c55e;
  --red:     #ef4444;
  --blue:    #3b82f6;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; overflow-x:hidden;
}

/* ── BACKGROUND ── */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.45}

/* ── APP ── */
#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}

/* ── SCREENS ── */
.screen{width:100%;max-width:720px;display:none;flex-direction:column;align-items:center;gap:28px}
.screen.active{display:flex;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ── HOME SCREEN ── */
.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(3.5rem,10vw,6rem);
  letter-spacing:3px; line-height:1;
  text-align:center;
}
.logo span{color:var(--yellow); text-shadow:0 0 40px rgba(245,197,24,.5)}
.tagline{color:var(--muted);font-size:1rem;text-align:center;letter-spacing:.05em}

.category-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:10px; width:100%;
}
.cat-btn{
  background:var(--card); border:1.5px solid var(--border);
  border-radius:12px; padding:18px 12px;
  cursor:pointer; text-align:center;
  transition:all .2s; position:relative; overflow:hidden;
}
.cat-btn::before{
  content:''; position:absolute; inset:0;
  background:var(--cat-color); opacity:0; transition:opacity .2s;
}
.cat-btn:hover{border-color:var(--cat-color);transform:translateY(-3px);box-shadow:0 8px 24px -8px var(--cat-color)}
.cat-btn:hover::before{opacity:.08}
.cat-btn.selected{border-color:var(--cat-color);box-shadow:0 0 20px -4px var(--cat-color)}
.cat-btn.selected::before{opacity:.12}
.cat-icon{font-size:2rem;display:block;margin-bottom:8px;position:relative;z-index:1}
.cat-name{font-size:.85rem;font-weight:600;position:relative;z-index:1}

.difficulty-row{display:flex;gap:10px;width:100%;justify-content:center;flex-wrap:wrap}
.diff-btn{
  background:var(--card); border:1.5px solid var(--border);
  border-radius:8px; padding:10px 24px;
  cursor:pointer; font-family:'DM Sans',sans-serif;
  font-size:.9rem; font-weight:600; color:var(--text);
  transition:all .2s;
}
.diff-btn:hover,.diff-btn.selected{border-color:var(--yellow);color:var(--yellow);background:rgba(245,197,24,.06)}

.start-btn{
  background:var(--yellow); color:#000;
  border:none; border-radius:12px;
  padding:16px 48px; font-family:'Bebas Neue',sans-serif;
  font-size:1.4rem; letter-spacing:2px;
  cursor:pointer; transition:all .2s;
  width:100%; max-width:300px;
}
.start-btn:hover{transform:scale(1.03);box-shadow:0 8px 32px -8px rgba(245,197,24,.6)}
.start-btn:active{transform:scale(.98)}
.start-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ── QUIZ SCREEN ── */
.quiz-header{width:100%;display:flex;align-items:center;gap:16px}
.q-category{
  font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--yellow);background:rgba(245,197,24,.1);
  border:1px solid rgba(245,197,24,.2);border-radius:6px;padding:4px 12px;
  white-space:nowrap;
}
.progress-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;background:var(--yellow);border-radius:3px;transition:width .4s ease}
.q-count{font-size:.8rem;color:var(--muted);white-space:nowrap}

/* TIMER */
.timer-ring{position:relative;width:54px;height:54px;flex-shrink:0}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring circle{transition:stroke-dashoffset .9s linear;stroke-linecap:round}
.timer-num{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:1.2rem;
}

/* QUESTION CARD */
.q-card{
  width:100%; background:var(--card);
  border:1px solid var(--border); border-radius:20px;
  padding:32px 28px;
}
.q-text{font-size:1.25rem;font-weight:500;line-height:1.5;margin-bottom:28px}

.options{display:flex;flex-direction:column;gap:10px}
.option{
  background:var(--bg); border:1.5px solid var(--border);
  border-radius:12px; padding:14px 20px;
  cursor:pointer; font-size:.95rem; font-weight:500;
  display:flex; align-items:center; gap:14px;
  transition:all .18s; position:relative; overflow:hidden;
  text-align:left;
}
.option::before{
  content:''; position:absolute; inset:0;
  background:var(--yellow); opacity:0; transition:opacity .18s;
}
.option:hover:not(.locked){border-color:rgba(245,197,24,.4);transform:translateX(4px)}
.option:hover:not(.locked)::before{opacity:.04}
.opt-letter{
  width:30px;height:30px;border-radius:8px;
  background:var(--border); display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:1px;
  flex-shrink:0; position:relative; z-index:1;transition:all .18s;
}
.opt-text{position:relative;z-index:1;flex:1}
.opt-icon{margin-left:auto;font-size:1.1rem;position:relative;z-index:1;opacity:0;transition:opacity .2s}

.option.correct{border-color:var(--green)!important;background:rgba(34,197,94,.08)!important}
.option.correct .opt-letter{background:var(--green);color:#000}
.option.correct .opt-icon{opacity:1}
.option.wrong{border-color:var(--red)!important;background:rgba(239,68,68,.08)!important}
.option.wrong .opt-letter{background:var(--red);color:#fff}
.option.wrong .opt-icon{opacity:1}
.option.locked{cursor:not-allowed;opacity:.6}
.option.locked:not(.correct):not(.wrong){opacity:.45}

/* STREAK */
.streak-bar{
  display:flex;align-items:center;gap:10px;
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:10px 18px;width:100%;
}
.streak-label{font-size:.8rem;color:var(--muted);font-weight:500}
.streak-dots{display:flex;gap:5px;flex:1}
.streak-dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--border);transition:all .3s;
}
.streak-dot.hit{background:var(--yellow);box-shadow:0 0 8px rgba(245,197,24,.6)}
.streak-dot.miss{background:var(--red)}
.score-live{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--yellow);letter-spacing:1px}

/* FEEDBACK TOAST */
#feedback-toast{
  position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:12px 24px;font-weight:600;font-size:.95rem;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  z-index:999;white-space:nowrap;pointer-events:none;
}
#feedback-toast.show{transform:translateX(-50%) translateY(0)}
#feedback-toast.correct-toast{border-color:var(--green);color:var(--green)}
#feedback-toast.wrong-toast{border-color:var(--red);color:var(--red)}

/* ── RESULT SCREEN ── */
.result-hero{text-align:center}
.result-emoji{font-size:4rem;display:block;margin-bottom:12px;animation:bounce 1s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.result-title{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:2px}
.result-score{
  font-family:'Bebas Neue',sans-serif;
  font-size:5rem;color:var(--yellow);letter-spacing:2px;
  text-shadow:0 0 40px rgba(245,197,24,.4);line-height:1;
}
.result-sub{color:var(--muted);font-size:1rem;margin-top:4px}

.result-stats{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:12px;width:100%;
}
.stat-box{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:20px 16px;text-align:center;
}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:1px}
.stat-label{font-size:.75rem;color:var(--muted);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:.08em}

.result-review{width:100%;display:flex;flex-direction:column;gap:8px}
.review-item{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:14px 18px;display:flex;gap:12px;align-items:flex-start;
}
.review-icon{font-size:1.1rem;flex-shrink:0;margin-top:2px}
.review-q{font-size:.88rem;color:var(--muted);line-height:1.5}
.review-a{font-size:.9rem;font-weight:600;margin-top:3px}
.review-a.correct-a{color:var(--green)}
.review-a.wrong-a{color:var(--red)}

.btn-row{display:flex;gap:12px;width:100%;flex-wrap:wrap}
.btn-secondary{
  flex:1;background:var(--card);border:1.5px solid var(--border);
  border-radius:12px;padding:14px;font-family:'DM Sans',sans-serif;
  font-size:.95rem;font-weight:600;color:var(--text);cursor:pointer;
  transition:all .2s;min-width:120px;
}
.btn-secondary:hover{border-color:var(--yellow);color:var(--yellow)}

/* RESPONSIVE */
@media(max-width:500px){
  .result-stats{grid-template-columns:repeat(3,1fr)}
  .q-text{font-size:1.05rem}
  .category-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="app">

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="logo">QUIZ<span>BATTLE</span></div>
    <p class="tagline">10 questions. 15 seconds each. Can you beat your brain?</p>

    <div style="width:100%">
      <p style="font-size:.8rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:12px;font-weight:600">Choose Category</p>
      <div class="category-grid" id="cat-grid"></div>
    </div>

    <div style="width:100%">
      <p style="font-size:.8rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:12px;font-weight:600">Difficulty</p>
      <div class="difficulty-row" id="diff-row"></div>
    </div>

    <button class="start-btn" id="start-btn" onclick="startQuiz()" disabled>START BATTLE</button>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-header">
      <span class="q-category" id="q-cat-label">Science</span>
      <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
      <span class="q-count" id="q-count">1 / 10</span>
      <div class="timer-ring">
        <svg width="54" height="54" viewBox="0 0 54 54">
          <circle cx="27" cy="27" r="22" fill="none" stroke="#2a2a2a" stroke-width="4"/>
          <circle id="timer-circle" cx="27" cy="27" r="22" fill="none"
            stroke="#f5c518" stroke-width="4"
            stroke-dasharray="138.2" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-num" id="timer-num">15</div>
      </div>
    </div>

    <div class="streak-bar">
      <span class="streak-label">STREAK</span>
      <div class="streak-dots" id="streak-dots"></div>
      <span class="score-live" id="score-live">0</span>
    </div>

    <div class="q-card">
      <div class="q-text" id="q-text">Loading question...</div>
      <div class="options" id="options"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div class="result-hero">
      <span class="result-emoji" id="result-emoji">🏆</span>
      <div class="result-title" id="result-title">GREAT JOB!</div>
      <div class="result-score" id="result-score">0</div>
      <div class="result-sub" id="result-sub">points scored</div>
    </div>

    <div class="result-stats">
      <div class="stat-box">
        <div class="stat-val" id="stat-correct" style="color:var(--green)">0</div>
        <div class="stat-label">Correct</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-wrong" style="color:var(--red)">0</div>
        <div class="stat-label">Wrong</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-streak" style="color:var(--yellow)">0</div>
        <div class="stat-label">Best Streak</div>
      </div>
    </div>

    <div style="width:100%">
      <p style="font-size:.8rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:12px;font-weight:600">Review Answers</p>
      <div class="result-review" id="result-review"></div>
    </div>

    <div class="btn-row">
      <button class="btn-secondary" onclick="goHome()">🏠 Home</button>
      <button class="start-btn" style="flex:1;max-width:none" onclick="restartQuiz()">PLAY AGAIN</button>
    </div>
  </div>

</div>

<div id="feedback-toast"></div>

// ── STATE ──
var selCat = null, selDiff = 'Medium';
var qList = [], qIdx = 0, score = 0;
var streak = 0, bestStreak = 0, streakHistory = [];
var correctCount = 0, wrongCount = 0;
var timerInterval = null, timeLeft = 15;
var answered = false;
var reviewData = [];

// ── CANVAS BG ──
(function() {
  var canvas = document.getElementById('bg-canvas');
  var ctx = canvas.getContext('2d');
  var particles = [];
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for (var i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 1.5 + .5,
      dx: (Math.random() - .5) * .3,
      dy: (Math.random() - .5) * .3,
      o: Math.random() * .5 + .1
    });
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(function(p) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(245,197,24,' + p.o + ')';
      ctx.fill();
      p.x += p.dx; p.y += p.dy;
      if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── RENDER HOME ──
(function renderHome() {
  var cg = document.getElementById('cat-grid');
  var html = '';
  CATEGORIES.forEach(function(c) {
    html += '<button class="cat-btn" style="--cat-color:' + c.color + '" onclick="selectCat(\'' + c.id + '\')" id="cat-' + c.id + '">' +
      '<span class="cat-icon">' + c.icon + '</span>' +
      '<div class="cat-name">' + c.name + '</div>' +
      '</button>';
  });
  cg.innerHTML = html;

  var dr = document.getElementById('diff-row');
  html = '';
  DIFFICULTIES.forEach(function(d) {
    html += '<button class="diff-btn' + (d === selDiff ? ' selected' : '') + '" onclick="selectDiff(\'' + d + '\')">' + d + '</button>';
  });
  dr.innerHTML = html;
})();

function selectCat(id) {
  selCat = id;
  document.querySelectorAll('.cat-btn').forEach(function(b){ b.classList.remove('selected'); });
  document.getElementById('cat-' + id).classList.add('selected');
  document.getElementById('start-btn').disabled = false;
}

function selectDiff(d) {
  selDiff = d;
  document.querySelectorAll('.diff-btn').forEach(function(b){ b.classList.remove('selected'); });
  event.target.classList.add('selected');
}

// ── START ──
function startQuiz() {
  if (!selCat) return;
  var pool = QB[selCat][selDiff];
  qList = shuffle(pool).slice(0, 10);
  qIdx = 0; score = 0; streak = 0; bestStreak = 0;
  correctCount = 0; wrongCount = 0; streakHistory = []; reviewData = [];
  showScreen('screen-quiz');
  document.getElementById('q-cat-label').textContent = CATEGORIES.find(function(c){ return c.id === selCat; }).name;
  renderQuestion();
}

function renderQuestion() {
  var q = qList[qIdx];
  answered = false;

  // progress
  document.getElementById('progress-bar').style.width = (qIdx / qList.length * 100) + '%';
  document.getElementById('q-count').textContent = (qIdx + 1) + ' / ' + qList.length;

  // streak dots
  var dots = document.getElementById('streak-dots');
  var dhtml = '';
  for (var i = 0; i < 10; i++) {
    var cls = 'streak-dot';
    if (i < streakHistory.length) cls += streakHistory[i] ? ' hit' : ' miss';
    dhtml += '<div class="' + cls + '"></div>';
  }
  dots.innerHTML = dhtml;
  document.getElementById('score-live').textContent = score;

  // question
  document.getElementById('q-text').textContent = q.q;

  // options
  var letters = ['A','B','C','D'];
  var icons   = ['✓','✗','✓','✗'];
  var ohtml = '';
  q.opts.forEach(function(opt, i) {
    ohtml += '<button class="option" onclick="selectAnswer(' + i + ')" id="opt-' + i + '">' +
      '<div class="opt-letter">' + letters[i] + '</div>' +
      '<div class="opt-text">' + opt + '</div>' +
      '<div class="opt-icon" id="opt-icon-' + i + '"></div>' +
    '</button>';
  });
  document.getElementById('options').innerHTML = ohtml;

  // timer
  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = 15;
  updateTimerUI();
  timerInterval = setInterval(function() {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      if (!answered) timeUp();
    }
  }, 1000);
}

function updateTimerUI() {
  document.getElementById('timer-num').textContent = timeLeft;
  var circle = document.getElementById('timer-circle');
  var pct = timeLeft / 15;
  var offset = 138.2 * (1 - pct);
  circle.style.strokeDashoffset = offset;
  circle.style.stroke = timeLeft > 7 ? '#f5c518' : timeLeft > 3 ? '#f97316' : '#ef4444';
  document.getElementById('timer-num').style.color = timeLeft > 7 ? '#f0f0f0' : timeLeft > 3 ? '#f97316' : '#ef4444';
}

function timeUp() {
  answered = true;
  var q = qList[qIdx];
  // show correct
  document.getElementById('opt-' + q.ans).classList.add('correct');
  document.getElementById('opt-icon-' + q.ans).textContent = '✓';
  document.querySelectorAll('.option').forEach(function(o){ o.classList.add('locked'); });
  streak = 0; wrongCount++;
  streakHistory.push(false);
  reviewData.push({ q: q.q, correct: q.opts[q.ans], userAns: null, isCorrect: false });
  showToast("⏰ Time's up! +" + 0, false);
  setTimeout(nextQuestion, 1800);
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);
  var q = qList[qIdx];
  var isCorrect = idx === q.ans;

  document.querySelectorAll('.option').forEach(function(o){ o.classList.add('locked'); });

  if (isCorrect) {
    document.getElementById('opt-' + idx).classList.add('correct');
    document.getElementById('opt-icon-' + idx).textContent = '✓';
    var points = 100 + (timeLeft * 10) + (streak * 20);
    score += points;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    correctCount++;
    streakHistory.push(true);
    reviewData.push({ q: q.q, correct: q.opts[q.ans], userAns: q.opts[idx], isCorrect: true });
    showToast('🔥 +' + points + ' pts' + (streak > 1 ? '  ×' + streak + ' streak!' : ''), true);
  } else {
    document.getElementById('opt-' + idx).classList.add('wrong');
    document.getElementById('opt-icon-' + idx).textContent = '✗';
    document.getElementById('opt-' + q.ans).classList.add('correct');
    document.getElementById('opt-icon-' + q.ans).textContent = '✓';
    streak = 0; wrongCount++;
    streakHistory.push(false);
    reviewData.push({ q: q.q, correct: q.opts[q.ans], userAns: q.opts[idx], isCorrect: false });
    showToast('❌ Wrong! Correct: ' + q.opts[q.ans], false);
  }

  setTimeout(nextQuestion, 1800);
}

function nextQuestion() {
  qIdx++;
  if (qIdx >= qList.length) { showResult(); return; }
  renderQuestion();
}

// ── RESULT ──
function showResult() {
  showScreen('screen-result');
  document.getElementById('result-score').textContent = score.toLocaleString();
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCount;
  document.getElementById('stat-streak').textContent = bestStreak;

  var pct = correctCount / qList.length;
  var emoji, title;
  if (pct === 1)      { emoji='🏆'; title='PERFECT SCORE!'; }
  else if (pct >= .8) { emoji='🔥'; title='AMAZING!'; }
  else if (pct >= .6) { emoji='😎'; title='GREAT JOB!'; }
  else if (pct >= .4) { emoji='🙂'; title='NOT BAD!'; }
  else                { emoji='💪'; title='KEEP PRACTICING!'; }
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent = correctCount + ' / ' + qList.length + ' correct answers';

  var rr = document.getElementById('result-review');
  var rhtml = '';
  reviewData.forEach(function(r) {
    rhtml += '<div class="review-item">' +
      '<div class="review-icon">' + (r.isCorrect ? '✅' : '❌') + '</div>' +
      '<div>' +
        '<div class="review-q">' + r.q + '</div>' +
        '<div class="review-a ' + (r.isCorrect ? 'correct-a' : 'wrong-a') + '">' +
          (r.isCorrect ? r.correct : '✗ ' + (r.userAns || 'No answer') + '  →  ✓ ' + r.correct) +
        '</div>' +
      '</div>' +
    '</div>';
  });
  rr.innerHTML = rhtml;
}

function restartQuiz() { startQuiz(); }
function goHome() { showScreen('screen-home'); }

// ── UTILS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

var toastTimeout;
function showToast(msg, correct) {
  var t = document.getElementById('feedback-toast');
  t.textContent = msg;
  t.className = 'show ' + (correct ? 'correct-toast' : 'wrong-toast');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(function() { t.classList.remove('show'); }, 1600);
}
